<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2f5e"/>
      <stop offset="100%" stop-color="#0d1b3a"/>
    </linearGradient>
    <linearGradient id="controlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1f4e"/>
      <stop offset="100%" stop-color="#1a0f3a"/>
    </linearGradient>
    <linearGradient id="shardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e3a1f"/>
      <stop offset="100%" stop-color="#0a2a15"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a29bfe"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#00b894"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#74b9ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" letter-spacing="2">MNEMES — MULTI-DEVICE MEMORY CONTROL PLANE</text>
  <text x="600" y="65" text-anchor="middle" font-size="13" fill="#6c5ce7" letter-spacing="3">DEVICE-OWNED · BITEMPORAL · PROVENANCE-BACKED · IDempotent</text>

  <!-- ============ DEVICE LAYER (Top) ============ -->
  <text x="600" y="100" text-anchor="middle" font-size="11" fill="#74b9ff" letter-spacing="2" font-weight="600">DEVICE LAYER</text>

  <!-- Laptop -->
  <rect x="80" y="115" width="180" height="70" rx="10" fill="url(#deviceGrad)" stroke="#4a6fa5" stroke-width="1.5" filter="url(#glow)"/>
  <text x="170" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#74b9ff">💻 Laptop</text>
  <text x="170" y="158" text-anchor="middle" font-size="10" fill="#8e9bb5">Device: UUIDv4</text>
  <text x="170" y="172" text-anchor="middle" font-size="10" fill="#8e9bb5">Actor: Hermes</text>

  <!-- Server -->
  <rect x="340" y="115" width="180" height="70" rx="10" fill="url(#deviceGrad)" stroke="#4a6fa5" stroke-width="1.5" filter="url(#glow)"/>
  <text x="430" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#74b9ff">🖥️ GPU Server</text>
  <text x="430" y="158" text-anchor="middle" font-size="10" fill="#8e9bb5">Device: UUIDv4</text>
  <text x="430" y="172" text-anchor="middle" font-size="10" fill="#8e9bb5">Actor: Ollama</text>

  <!-- Edge -->
  <rect x="600" y="115" width="180" height="70" rx="10" fill="url(#deviceGrad)" stroke="#4a6fa5" stroke-width="1.5" filter="url(#glow)"/>
  <text x="690" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#74b9ff">📱 Edge Device</text>
  <text x="690" y="158" text-anchor="middle" font-size="10" fill="#8e9bb5">Device: UUIDv4</text>
  <text x="690" y="172" text-anchor="middle" font-size="10" fill="#8e9bb5">Actor: Service</text>

  <!-- Phone -->
  <rect x="860" y="115" width="180" height="70" rx="10" fill="url(#deviceGrad)" stroke="#4a6fa5" stroke-width="1.5" filter="url(#glow)"/>
  <text x="950" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#74b9ff">📱 Phone</text>
  <text x="950" y="158" text-anchor="middle" font-size="10" fill="#8e9bb5">Device: UUIDv4</text>
  <text x="950" y="172" text-anchor="middle" font-size="10" fill="#8e9bb5">Actor: Plugin</text>

  <!-- ============ CONTROL PLANE (Middle) ============ -->
  <text x="600" y="230" text-anchor="middle" font-size="11" fill="#a29bfe" letter-spacing="2" font-weight="600">CONTROL PLANE — pooled.db</text>

  <rect x="120" y="245" width="960" height="160" rx="14" fill="url(#controlGrad)" stroke="#6c5ce7" stroke-width="2" filter="url(#softGlow)"/>

  <!-- Control plane internal boxes -->
  <rect x="150" y="265" width="140" height="55" rx="8" fill="#2d1b69" stroke="#6c5ce7" stroke-width="1" opacity="0.9"/>
  <text x="220" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Devices</text>
  <text x="220" y="305" text-anchor="middle" font-size="9" fill="#9d8cd5">identity · status · creds</text>

  <rect x="310" y="265" width="140" height="55" rx="8" fill="#2d1b69" stroke="#6c5ce7" stroke-width="1" opacity="0.9"/>
  <text x="380" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Actors</text>
  <text x="380" y="305" text-anchor="middle" font-size="9" fill="#9d8cd5">agent · human · service</text>

  <rect x="470" y="265" width="140" height="55" rx="8" fill="#2d1b69" stroke="#6c5ce7" stroke-width="1" opacity="0.9"/>
  <text x="540" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Operations</text>
  <text x="540" y="305" text-anchor="middle" font-size="9" fill="#9d8cd5">envelopes · idempotency</text>

  <rect x="630" y="265" width="140" height="55" rx="8" fill="#2d1b69" stroke="#6c5ce7" stroke-width="1" opacity="0.9"/>
  <text x="700" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Provenance</text>
  <text x="700" y="305" text-anchor="middle" font-size="9" fill="#9d8cd5">edges · bitemporal</text>

  <rect x="790" y="265" width="140" height="55" rx="8" fill="#2d1b69" stroke="#6c5ce7" stroke-width="1" opacity="0.9"/>
  <text x="860" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Routing</text>
  <text x="860" y="305" text-anchor="middle" font-size="9" fill="#9d8cd5">sparse · receipts</text>

  <rect x="950" y="265" width="100" height="55" rx="8" fill="#2d1b69" stroke="#6c5ce7" stroke-width="1" opacity="0.9"/>
  <text x="1000" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Audit</text>
  <text x="1000" y="305" text-anchor="middle" font-size="9" fill="#9d8cd5">events · receipts</text>

  <!-- Server box -->
  <rect x="150" y="335" width="900" height="50" rx="8" fill="#1e1e3e" stroke="#a29bfe" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="600" y="365" text-anchor="middle" font-size="12" fill="#a29bfe">Loopback HTTP Server (axum) — /v1/devices · /v1/actors · /v1/operations · /v1/search/witnessed · /mcp · /v1/receipts</text>

  <!-- Arrows from devices to control plane -->
  <line x1="170" y1="185" x2="220" y2="260" stroke="#74b9ff" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <line x1="430" y1="185" x2="380" y2="260" stroke="#74b9ff" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <line x1="690" y1="185" x2="700" y2="260" stroke="#74b9ff" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <line x1="950" y1="185" x2="860" y2="260" stroke="#74b9ff" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>

  <!-- ============ SHARD LAYER (Bottom) ============ -->
  <text x="600" y="445" text-anchor="middle" font-size="11" fill="#00b894" letter-spacing="2" font-weight="600">SEMANTIC SHARD LAYER — memory/shards/&lt;device_uuid&gt;/memory.db</text>

  <!-- Shard 1 -->
  <rect x="80" y="465" width="200" height="120" rx="10" fill="url(#shardGrad)" stroke="#00b894" stroke-width="1.5" filter="url(#glow)"/>
  <text x="180" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#00b894">Shard: Laptop</text>
  <text x="180" y="510" text-anchor="middle" font-size="9" fill="#55efc4">facts · docs · chunks</text>
  <text x="180" y="525" text-anchor="middle" font-size="9" fill="#55efc4">embeddings · FTS5</text>
  <text x="180" y="540" text-anchor="middle" font-size="9" fill="#55efc4">vector (usearch)</text>
  <text x="180" y="555" text-anchor="middle" font-size="9" fill="#55efc4">receipts · authority</text>
  <text x="180" y="575" text-anchor="middle" font-size="8" fill="#2ecc71" font-style="italic">semantic-memory</text>

  <!-- Shard 2 -->
  <rect x="340" y="465" width="200" height="120" rx="10" fill="url(#shardGrad)" stroke="#00b894" stroke-width="1.5" filter="url(#glow)"/>
  <text x="440" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#00b894">Shard: Server</text>
  <text x="440" y="510" text-anchor="middle" font-size="9" fill="#55efc4">facts · docs · chunks</text>
  <text x="440" y="525" text-anchor="middle" font-size="9" fill="#55efc4">embeddings · FTS5</text>
  <text x="440" y="540" text-anchor="middle" font-size="9" fill="#55efc4">vector (usearch)</text>
  <text x="440" y="555" text-anchor="middle" font-size="9" fill="#55efc4">receipts · authority</text>
  <text x="440" y="575" text-anchor="middle" font-size="8" fill="#2ecc71" font-style="italic">semantic-memory</text>

  <!-- Shard 3 -->
  <rect x="600" y="465" width="200" height="120" rx="10" fill="url(#shardGrad)" stroke="#00b894" stroke-width="1.5" filter="url(#glow)"/>
  <text x="700" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#00b894">Shard: Edge</text>
  <text x="700" y="510" text-anchor="middle" font-size="9" fill="#55efc4">facts · docs · chunks</text>
  <text x="700" y="525" text-anchor="middle" font-size="9" fill="#55efc4">embeddings · FTS5</text>
  <text x="700" y="540" text-anchor="middle" font-size="9" fill="#55efc4">vector (usearch)</text>
  <text x="700" y="555" text-anchor="middle" font-size="9" fill="#55efc4">receipts · authority</text>
  <text x="700" y="575" text-anchor="middle" font-size="8" fill="#2ecc71" font-style="italic">semantic-memory</text>

  <!-- Shard 4 -->
  <rect x="860" y="465" width="200" height="120" rx="10" fill="url(#shardGrad)" stroke="#00b894" stroke-width="1.5" filter="url(#glow)"/>
  <text x="960" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#00b894">Shard: Phone</text>
  <text x="960" y="510" text-anchor="middle" font-size="9" fill="#55efc4">facts · docs · chunks</text>
  <text x="960" y="525" text-anchor="middle" font-size="9" fill="#55efc4">embeddings · FTS5</text>
  <text x="960" y="540" text-anchor="middle" font-size="9" fill="#55efc4">vector (usearch)</text>
  <text x="960" y="555" text-anchor="middle" font-size="9" fill="#55efc4">receipts · authority</text>
  <text x="960" y="575" text-anchor="middle" font-size="8" fill="#2ecc71" font-style="italic">semantic-memory</text>

  <!-- Arrows from control plane to shards -->
  <line x1="220" y1="400" x2="180" y2="460" stroke="#a29bfe" stroke-width="1.5" marker-end="url(#arrowPurple)" opacity="0.5"/>
  <line x1="380" y1="400" x2="440" y2="460" stroke="#a29bfe" stroke-width="1.5" marker-end="url(#arrowPurple)" opacity="0.5"/>
  <line x1="700" y1="400" x2="700" y2="460" stroke="#a29bfe" stroke-width="1.5" marker-end="url(#arrowPurple)" opacity="0.5"/>
  <line x1="860" y1="400" x2="960" y2="460" stroke="#a29bfe" stroke-width="1.5" marker-end="url(#arrowPurple)" opacity="0.5"/>

  <!-- Replication arrows (bidirectional) -->
  <path d="M 280 525 Q 390 510 340 525" fill="none" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.4" stroke-dasharray="4,3"/>
  <path d="M 540 525 Q 620 510 600 525" fill="none" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.4" stroke-dasharray="4,3"/>
  <path d="M 800 525 Q 880 510 860 525" fill="none" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- ============ BOTTOM LEGEND ============ -->
  <rect x="120" y="615" width="960" height="100" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <circle cx="160" cy="645" r="5" fill="#74b9ff"/>
  <text x="175" y="649" font-size="10" fill="#c9d1d9">Device registration &amp; credential rotation</text>

  <circle cx="160" cy="665" r="5" fill="#a29bfe"/>
  <text x="175" y="669" font-size="10" fill="#c9d1d9">Operation envelope submission (idempotent)</text>

  <circle cx="160" y="685" r="5" fill="#00b894"/>
  <text x="175" y="689" font-size="10" fill="#c9d1d9">Routed search across shards with receipts</text>

  <circle cx="540" cy="645" r="5" fill="#fdcb6e"/>
  <text x="555" y="649" font-size="10" fill="#c9d1d9">Provenance edge recording (bitemporal)</text>

  <circle cx="540" cy="665" r="5" fill="#e17055"/>
  <text x="555" y="669" font-size="10" fill="#c9d1d9">Mutation journal replication (signed, Ed25519)</text>

  <circle cx="540" cy="685" r="5" fill="#6c5ce7"/>
  <text x="555" y="689" font-size="10" fill="#c9d1d9">MCP stdio proxy (tool-profile gated)</text>

  <text x="600" y="710" text-anchor="middle" font-size="9" fill="#586069">Apache-2.0 · Built by RecursiveIntell · semantic-memory compatible</text>
</svg>