<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1f4e"/>
      <stop offset="100%" stop-color="#1a0f3a"/>
    </linearGradient>
    <linearGradient id="shardG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e3a1f"/>
      <stop offset="100%" stop-color="#0a2a15"/>
    </linearGradient>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a29bfe"/>
    </marker>
    <marker id="arrowR2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#00b894"/>
    </marker>
    <filter id="glowR" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="400" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8" letter-spacing="1">SPARSE SHARD ROUTING</text>
  <text x="550" y="55" text-anchor="middle" font-size="11" fill="#6c5ce7" letter-spacing="2">Query → rank shards by token overlap + locality → search top-K → merge by score</text>

  <!-- Query input -->
  <rect x="50" y="80" width="200" height="50" rx="10" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1.5" filter="url(#glowR)"/>
  <text x="150" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#a29bfe">Query: "rust async"</text>
  <text x="150" y="118" text-anchor="middle" font-size="9" fill="#8e9bb5">tokenized → [rust, async]</text>

  <!-- Router brain -->
  <rect x="350" y="80" width="200" height="200" rx="14" fill="url(#brainGrad)" stroke="#a29bfe" stroke-width="2" filter="url(#glowR)"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#a29bfe">Routing Brain</text>
  <text x="450" y="130" text-anchor="middle" font-size="9" fill="#9d8cd5">1. Filter eligible shards</text>
  <text x="450" y="148" text-anchor="middle" font-size="9" fill="#9d8cd5">   (active + device active)</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="#9d8cd5">2. Score: overlap × 2</text>
  <text x="450" y="188" text-anchor="middle" font-size="9" fill="#9d8cd5">   + locality bonus</text>
  <text x="450" y="210" text-anchor="middle" font-size="9" fill="#9d8cd5">3. Sort by score desc</text>
  <text x="450" y="228" text-anchor="middle" font-size="9" fill="#9d8cd5">   + UUID tiebreak</text>
  <text x="450" y="250" text-anchor="middle" font-size="9" fill="#9d8cd5">4. Select top-K budget</text>
  <text x="450" y="268" text-anchor="middle" font-size="9" fill="#fdcb6e">→ ShardRoutingReceipt</text>

  <!-- Arrow query → brain -->
  <line x1="250" y1="105" x2="345" y2="120" stroke="#a29bfe" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Shards -->
  <rect x="650" y="80" width="160" height="45" rx="8" fill="url(#shardG)" stroke="#00b894" stroke-width="1.5"/>
  <text x="730" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#00b894">Shard: Laptop</text>
  <text x="730" y="115" text-anchor="middle" font-size="8" fill="#55efc4">score: 3 (overlap+loc)</text>

  <rect x="650" y="140" width="160" height="45" rx="8" fill="url(#shardG)" stroke="#00b894" stroke-width="1.5"/>
  <text x="730" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#00b894">Shard: Server</text>
  <text x="730" y="175" text-anchor="middle" font-size="8" fill="#55efc4">score: 2 (overlap only)</text>

  <rect x="650" y="200" width="160" height="45" rx="8" fill="#0d1117" stroke="#4a5568" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="730" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#4a5568">Shard: Edge</text>
  <text x="730" y="235" text-anchor="middle" font-size="8" fill="#4a5568">score: 0 — SKIPPED</text>

  <rect x="650" y="260" width="160" height="45" rx="8" fill="#0d1117" stroke="#4a5568" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="730" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#4a5568">Shard: Phone</text>
  <text x="730" y="295" text-anchor="middle" font-size="8" fill="#4a5568">score: 0 — SKIPPED</text>

  <!-- Arrows brain → shards -->
  <line x1="550" y1="120" x2="645" y2="102" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowR2)"/>
  <line x1="550" y1="145" x2="645" y2="162" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowR2)"/>
  <line x1="550" y1="200" x2="645" y2="222" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="550" y1="230" x2="645" y2="282" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Merge -->
  <rect x="870" y="80" width="180" height="80" rx="10" fill="#1a1a2e" stroke="#fdcb6e" stroke-width="1.5" filter="url(#glowR)"/>
  <text x="960" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#fdcb6e">Merge &amp; Dedup</text>
  <text x="960" y="123" text-anchor="middle" font-size="9" fill="#c9d1d9">sort by score</text>
  <text x="960" y="138" text-anchor="middle" font-size="9" fill="#c9d1d9">dedup by item ID</text>
  <text x="960" y="153" text-anchor="middle" font-size="9" fill="#e17055">fail on content conflict</text>

  <line x1="810" y1="102" x2="865" y2="110" stroke="#fdcb6e" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="810" y1="162" x2="865" y2="135" stroke="#fdcb6e" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Result -->
  <rect x="870" y="180" width="180" height="60" rx="10" fill="#0e3a1f" stroke="#00b894" stroke-width="2" filter="url(#glowR)"/>
  <text x="960" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#00b894">RoutedSearchResponse</text>
  <text x="960" y="225" text-anchor="middle" font-size="9" fill="#55efc4">results + routing receipt</text>

  <line x1="960" y1="160" x2="960" y2="175" stroke="#00b894" stroke-width="2" marker-end="url(#arrowR2)"/>

  <!-- Fallback note -->
  <rect x="870" y="260" width="180" height="55" rx="8" fill="#0d1117" stroke="#e17055" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="960" y="282" text-anchor="middle" font-size="10" font-weight="600" fill="#e17055">Fallback</text>
  <text x="960" y="300" text-anchor="middle" font-size="8" fill="#c9d1d9">if top-K results &lt; requested</text>
  <text x="960" y="312" text-anchor="middle" font-size="8" fill="#c9d1d9">→ expand to more shards</text>

  <line x1="960" y1="240" x2="960" y2="255" stroke="#e17055" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowR)"/>

  <!-- Bottom info -->
  <text x="550" y="365" text-anchor="middle" font-size="10" fill="#586069">Shard budget defaults to top-K shards · exhaustive=true selects all eligible · receipt records every shard opened, skipped, and result merged</text>
  <text x="550" y="385" text-anchor="middle" font-size="9" fill="#586069">Locality bonus: +1 if requester_device_id == shard.device_id · Stable tiebreak by UUID ascending</text>
</svg>