<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arrowFlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a29bfe"/>
    </marker>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="520" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8" letter-spacing="1">PROVENANCE &amp; BITEMPORAL LINEAGE FLOW</text>
  <text x="550" y="55" text-anchor="middle" font-size="11" fill="#6c5ce7" letter-spacing="2">Every memory has a full audit trail — who observed it, when it was valid, and when the server recorded it</text>

  <!-- Flow lane background -->
  <rect x="40" y="80" width="1020" height="60" rx="8" fill="url(#flowGrad)"/>
  <rect x="40" y="180" width="1020" height="60" rx="8" fill="url(#flowGrad)" opacity="0.5"/>
  <rect x="40" y="280" width="1020" height="60" rx="8" fill="url(#flowGrad)" opacity="0.3"/>

  <!-- Lane labels -->
  <text x="55" y="115" font-size="10" fill="#fdcb6e" font-weight="600">VALID TIME</text>
  <text x="55" y="215" font-size="10" fill="#74b9ff" font-weight="600">OBSERVED AT</text>
  <text x="55" y="315" font-size="10" fill="#a29bfe" font-weight="600">RECORDED AT</text>

  <!-- Step boxes (Valid Time lane) -->
  <rect x="180" y="90" width="120" height="40" rx="8" fill="#2d1b3d" stroke="#fdcb6e" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="240" y="115" text-anchor="middle" font-size="11" fill="#fdcb6e">Fact observed</text>

  <rect x="400" y="90" width="120" height="40" rx="8" fill="#2d1b3d" stroke="#fdcb6e" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="460" y="115" text-anchor="middle" font-size="11" fill="#fdcb6e">Fact asserted</text>

  <rect x="620" y="90" width="120" height="40" rx="8" fill="#2d1b3d" stroke="#fdcb6e" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="680" y="115" text-anchor="middle" font-size="11" fill="#fdcb6e">Fact superseded</text>

  <rect x="840" y="90" width="120" height="40" rx="8" fill="#2d1b3d" stroke="#fdcb6e" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="900" y="115" text-anchor="middle" font-size="11" fill="#fdcb6e">Fact revoked</text>

  <!-- Arrows -->
  <line x1="300" y1="110" x2="395" y2="110" stroke="#fdcb6e" stroke-width="1.5" marker-end="url(#arrowFlow)" opacity="0.7"/>
  <line x1="520" y1="110" x2="615" y2="110" stroke="#fdcb6e" stroke-width="1.5" marker-end="url(#arrowFlow)" opacity="0.7"/>
  <line x1="740" y1="110" x2="835" y2="110" stroke="#fdcb6e" stroke-width="1.5" marker-end="url(#arrowFlow)" opacity="0.7"/>

  <!-- Step boxes (Observed At lane) -->
  <rect x="180" y="190" width="120" height="40" rx="8" fill="#1a2f5e" stroke="#74b9ff" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="240" y="215" text-anchor="middle" font-size="10" fill="#74b9ff">Device: laptop</text>

  <rect x="400" y="190" width="120" height="40" rx="8" fill="#1a2f5e" stroke="#74b9ff" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="460" y="215" text-anchor="middle" font-size="10" fill="#74b9ff">Actor: Hermes</text>

  <rect x="620" y="190" width="120" height="40" rx="8" fill="#1a2f5e" stroke="#74b9ff" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="680" y="215" text-anchor="middle" font-size="10" fill="#74b9ff">Device: server</text>

  <rect x="840" y="190" width="120" height="40" rx="8" fill="#1a2f5e" stroke="#74b9ff" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="900" y="215" text-anchor="middle" font-size="10" fill="#74b9ff">Operator</text>

  <!-- Step boxes (Recorded At lane) -->
  <rect x="180" y="290" width="120" height="40" rx="8" fill="#2a1f4e" stroke="#a29bfe" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="240" y="315" text-anchor="middle" font-size="10" fill="#a29bfe">server stamps</text>

  <rect x="400" y="290" width="120" height="40" rx="8" fill="#2a1f4e" stroke="#a29bfe" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="460" y="315" text-anchor="middle" font-size="10" fill="#a29bfe">server stamps</text>

  <rect x="620" y="290" width="120" height="40" rx="8" fill="#2a1f4e" stroke="#a29bfe" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="680" y="315" text-anchor="middle" font-size="10" fill="#a29bfe">server stamps</text>

  <rect x="840" y="290" width="120" height="40" rx="8" fill="#2a1f4e" stroke="#a29bfe" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="900" y="315" text-anchor="middle" font-size="10" fill="#a29bfe">server stamps</text>

  <!-- Vertical connectors -->
  <line x1="240" y1="130" x2="240" y2="185" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="240" y1="230" x2="240" y2="285" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="460" y1="130" x2="460" y2="185" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="460" y1="230" x2="460" y2="285" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="680" y1="130" x2="680" y2="185" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="680" y1="230" x2="680" y2="285" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="900" y1="130" x2="900" y2="185" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="900" y1="230" x2="900" y2="285" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Operation kind labels -->
  <text x="240" y="380" text-anchor="middle" font-size="9" fill="#8e9bb5" font-style="italic">OperationKind::Observe</text>
  <text x="460" y="380" text-anchor="middle" font-size="9" fill="#8e9bb5" font-style="italic">OperationKind::Assert</text>
  <text x="680" y="380" text-anchor="middle" font-size="9" fill="#8e9bb5" font-style="italic">OperationKind::Supersede</text>
  <text x="900" y="380" text-anchor="middle" font-size="9" fill="#8e9bb5" font-style="italic">OperationKind::Revoke</text>

  <!-- Provenance edge types -->
  <rect x="150" y="410" width="800" height="75" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <text x="170" y="435" font-size="10" font-weight="600" fill="#fdcb6e">Edge Types:</text>
  <text x="250" y="435" font-size="9" fill="#c9d1d9">observed_by</text>
  <text x="350" y="435" font-size="9" fill="#c9d1d9">recorded_by</text>
  <text x="455" y="435" font-size="9" fill="#c9d1d9">derived_from</text>
  <text x="560" y="435" font-size="9" fill="#c9d1d9">supports</text>
  <text x="640" y="435" font-size="9" fill="#c9d1d9">contradicts</text>
  <text x="735" y="435" font-size="9" fill="#c9d1d9">supersedes</text>
  <text x="830" y="435" font-size="9" fill="#c9d1d9">retrieved_from</text>

  <text x="170" y="460" font-size="10" font-weight="600" fill="#a29bfe">Query:</text>
  <text x="230" y="460" font-size="8" fill="#9d8cd5" font-family="monospace">recorded_at &lt;= :as_of_recorded AND ((valid_from IS NULL OR valid_from &lt;= :as_of_valid) AND (valid_to IS NULL OR :as_of_valid &lt; valid_to))</text>

  <text x="550" y="480" text-anchor="middle" font-size="9" fill="#586069">As-of queries traverse both valid-time and recorded-time dimensions independently</text>
</svg>